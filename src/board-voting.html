<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board Voting - MangaSystem</title>
    <link rel="stylesheet" href="style-workspace.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <aside class="sidebar">
        <div class="workspace-title">
            <div class="ws-logo">EB</div>
            <div class="ws-name">Editorial Board</div>
        </div>
        
        <nav class="nav-group">
            <a href="board-dashboard.html" class="nav-item "><i class="fa-solid fa-border-all"></i> Dashboard</a>
<a href="board-submissions.html" class="nav-item "><i class="fa-solid fa-inbox"></i> Submissions</a>
<a href="board-voting.html" class="nav-item active"><i class="fa-solid fa-vote-yea"></i> Voting</a>
<a href="board-result.html" class="nav-item "><i class="fa-solid fa-circle-check"></i> Final Result</a>
        </nav>
        <div class="sidebar-divider"></div>
        <nav class="nav-group" style="flex-grow: 0; margin-top: auto; padding-bottom: 20px;">
            <a href="profile.html" class="nav-item"><i class="fa-solid fa-user"></i> Profile</a>
            <a href="notifications.html" class="nav-item"><i class="fa-solid fa-bell"></i> Notifications</a>
            <a href="index.html" class="nav-item"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </nav>
    </aside>
    <main class="main-wrapper">
        <header class="topbar">
            <div class="topbar-left">
                <a href="#">Workflow</a><a href="#">Schedule</a><a href="#">Assets</a>
            </div>
            <div class="topbar-right">
                <div class="search-box"><i class="fa-solid fa-magnifying-glass" style="color: #9ca3af;"></i><input type="text" placeholder="Search..."></div>
                <a href="notifications.html" class="top-icon"><i class="fa-regular fa-bell"></i></a>
                <div style="width: 32px; height: 32px; background: #e0e7ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #4f46e5; font-weight: bold;">EB</div>
            </div>
        </header>
        <section class="content-padding">
            <div class="page-header">
        <div><h1>Board Voting</h1><p>Cast Approve, Reject, or Request Revision vote.</p></div>
        
    </div>
<div class="card-box">
    <div class="series-grid">
        <button class="action-btn" data-vote="Approve"><i class="fa-solid fa-check"></i> Approve</button>
        <button class="action-btn" data-vote="Reject"><i class="fa-solid fa-xmark"></i> Reject</button>
        <button class="action-btn selected" data-vote="Request Revision"><i class="fa-solid fa-rotate-left"></i> Request Revision</button>
    </div>
    <div class="form-group" style="margin-top:20px;"><label>Board Comment</label><textarea>Pacing should be improved before publication.</textarea></div>
    <a class="btn-publish" href="board-result.html">Submit Vote</a>
</div>

        </section>
    </main>
    <script src="script.js"></script>
    <script src="script-workspace.js"></script>
</body>
</html>
