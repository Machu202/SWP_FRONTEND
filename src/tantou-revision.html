<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revision Tracking - MangaFlow Editorial</title>
    <link rel="stylesheet" href="style-workspace.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="tantou-screen" data-page="revision">
    <aside class="sidebar tantou-sidebar">
        <div class="tantou-brand-block">
            <div class="editor-card">
                <div class="editor-avatar"><img src="cover.png" alt="Tantou avatar"></div>
                <div>
                    <div class="editor-name">Tantou Editorial</div>
                    <div class="editor-role">Production Manager</div>
                </div>
            </div>
            <a class="sidebar-cta" href="tantou-review.html"><i class="fa-solid fa-play"></i><span>Start Review</span></a>
        </div>

        <nav class="nav-group tantou-nav">
                <a href="tantou-dashboard.html" class="nav-item"><i class="fa-solid fa-border-all"></i><span>Dashboard</span></a>
                <a href="tantou-review.html" class="nav-item"><i class="fa-solid fa-list-check"></i><span>Chapter Review</span></a>
                <a href="tantou-feedback.html" class="nav-item"><i class="fa-solid fa-pen-to-square"></i><span>Annotation & Feedback</span></a>
                <a href="tantou-revision.html" class="nav-item active"><i class="fa-solid fa-arrows-rotate"></i><span>Revision Tracking</span></a>
                <a href="tantou-report.html" class="nav-item"><i class="fa-solid fa-chart-column"></i><span>Editorial Report</span></a>
        </nav>

        <div class="sidebar-spacer"></div>
        <div class="sidebar-divider"></div>
        <nav class="nav-group tantou-nav footer-nav">
            <a href="profile.html" class="nav-item"><i class="fa-solid fa-gear"></i><span>Settings</span></a>
            <a href="index.html" class="nav-item"><i class="fa-solid fa-right-from-bracket"></i><span>Logout</span></a>
        </nav>
    </aside>

    <main class="main-wrapper tantou-main">
        <header class="topbar tantou-topbar">
            <div class="topbar-brand">
                <div class="brand-lockup">
                    <div class="brand-wordmark">MangaFlow Editorial</div>
                    <div class="brand-context">Monitor revision progress before board submission.</div>
                </div>
            </div>
            <div class="topbar-right">
                <div class="search-box tantou-search"><i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="Search revisions..."></div>
                <a href="notifications.html" class="top-icon"><i class="fa-regular fa-bell"></i></a>
                <a href="#" class="top-icon"><i class="fa-solid fa-clock-rotate-left"></i></a>
                <a href="#" class="top-icon"><i class="fa-regular fa-circle-question"></i></a>
                <button class="mode-chip">Editor Mode</button>
                <a href="profile.html" class="topbar-avatar"><img src="cover.png" alt="User avatar"></a>
            </div>
        </header>
        <section class="content-padding"></section>
    </main>

    <script src="api.js"></script>
    <script src="script.js"></script>
    <script src="script-workspace.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
    <script src="role-integration.js"></script>
</body>
</html>
