<a href="tantou-review.html" class="nav-item "><i class="fa-solid fa-message"></i> Chapter Review</a>

<a href="tantou-report.html" class="nav-item "><i class="fa-solid fa-file-signature"></i> Editorial Report</a>
        </nav>
        <div class="sidebar-divider"></div>
        <nav class="nav-group" style="flex-grow: 0; margin-top: auto; padding-bottom: 20px;">

            <a href="index.html" class="nav-item"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </nav>
    </aside>
    <main class="main-wrapper">
        <header class="topbar">
            <div class="topbar-left">
                <a href="#">Workflow</a><a href="#">Schedule</a><a href="#">Assets</a>
            </div>
            <div class="topbar-right">
                <div class="search-box"><i class="fa-solid fa-magnifying-glass" style="color: #9ca3af;"></i><input type="text" placeholder="Search..."></div>
                <a href="notifications.html" class="top-icon"><i class="fa-regular fa-bell"></i></a>
                <div style="width: 32px; height: 32px; background: #e0e7ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #4f46e5; font-weight: bold;">TE</div>
            </div>
        </header>
        <section class="content-padding">
            <div class="page-header">
        <div><h1>Revision Tracking</h1><p>Compare page versions and approve or request more changes.</p></div>
        
    </div>
<div class="card-box">
    <h2 id="version-label">Version 2</h2>
    <input id="version-range" type="range" min="1" max="4" value="2" style="width:100%; margin:20px 0;">
    <div class="grid-layout">
        <div class="preview-panel" style="height:420px;display:flex;align-items:center;justify-content:center;">Previous Version</div>
        <div class="preview-panel" style="height:420px;display:flex;align-items:center;justify-content:center;background:#eef2ff;">Selected Version</div>
    </div>
    <div style="margin-top:20px;"><a class="btn-publish" href="tantou-report.html">Approve for Report</a><button class="btn-publish" data-toast="More changes requested" style="margin-left:10px;background:#ef4444;">Request More Changes</button></div>
</div>

        </section>
    </main>
    <script src="api.js"></script>
    <script src="script.js"></script>
    <script src="script-workspace.js"></script>
