<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaSystem - Authentication</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-default-role="assistant">
    <div class="split-layout">
        <div class="left-panel">
            <img src="cover.png" alt="Manga Covers" class="manga-image">
        </div>

        <div class="right-panel">
            <div class="form-container">
                <h1 class="logo">MangaSystem</h1>

                <div class="tabs" id="login-tabs">
                    <button class="tab active" id="tab-password">PASSWORD</button>
                    <button class="tab" id="tab-otp">via OTP</button>
                </div>

                <div id="form-password-section" class="form-section">
                    <div class="input-group">
                        <label>Email hoặc Tên đăng nhập</label>
                        <input type="text" id="login-username" placeholder="Select a role to auto-fill demo account">
                    </div>

                    <div class="input-group">
                        <label>Mật Khẩu</label>
                        <div class="password-wrapper">
                            <input type="password" id="login-password" placeholder="••••••">
                            <span class="eye-icon">👁️</span>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Login Role</label>
                        <select class="role-select" id="login-role">
                            <option value="mangaka">Mangaka</option>
                            <option value="assistant">Assistant</option>
                            <option value="tantou">Tantou Editor</option>
                            <option value="editorial">Editorial Board</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>

                    <div class="form-actions">
                        <label class="remember-me">
                            <input type="checkbox"> Remember password
                        </label>
                        <a href="#" class="forgot-link" id="forgot-password-link">Forgot password?</a>
                    </div>

                    <button class="btn-primary" id="btn-login">Login</button>

                    <div class="divider">Role quick login</div>

                    <div class="social-login role-shortcuts">
                        <a class="btn-social role-shortcut" href="mangaka-login.html">Mangaka</a>
                        <a class="btn-social role-shortcut" href="assistant-login.html">Assistant</a>
                    </div>

                    <p class="new-account">New to this page ? <a href="#" id="go-to-register">create new account</a></p>
                </div>

                <div id="form-otp-section" class="form-section" style="display: none;">
                    <div id="otp-step-1">
                        <div class="input-group">
                            <label>Enter gmail / Apple ID</label>
                            <input type="text" id="otp-username" placeholder="Demo account will follow selected role">
                        </div>

                        <div class="input-group">
                            <label>OTP Role</label>
                            <select class="role-select" id="otp-role">
                                <option value="mangaka">Mangaka</option>
                                <option value="assistant">Assistant</option>
                                <option value="tantou">Tantou Editor</option>
                                <option value="editorial">Editorial Board</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>

                        <div class="center-btn">
                            <button class="btn-secondary" id="btn-enter-otp">Enter</button>
                        </div>
                    </div>

                    <div id="otp-step-2" style="display: none;">
                        <div class="input-group">
                            <label>OTP Code</label>
                            <input type="text" class="otp-input-large" value="123456">
                        </div>
                        <p class="otp-timer-text">Code expires in <span id="timer-count">60</span>s</p>
                        <button class="btn-primary" id="btn-verify-otp">Verify OTP & Login</button>
                        <div class="otp-resend-action">
                            <span class="not-received-text">Didn't receive code?</span>
                            <button class="btn-orange" id="btn-send-again">Send Again</button>
                        </div>
                    </div>
                </div>

                <div id="form-register-section" class="form-section" style="display: none;">
                    <div class="register-header-box">
                        <span class="register-title">Registration</span>
                    </div>

                    <div class="input-group">
                        <label>Name</label>
                        <input type="text" placeholder="Your full name">
                    </div>

                    <div class="input-group">
                        <label>Email</label>
                        <input type="text" placeholder="example@gmail.com">
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" placeholder="••••••">
                    </div>

                    <div class="input-group">
                        <label>Role</label>
                        <select class="role-select">
                            <option value="mangaka">Mangaka</option>
                            <option value="assistant">Assistant</option>
                            <option value="tantou">Tantou editor</option>
                            <option value="editorial">Editorial board</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>

                    <button class="btn-primary btn-registrate">Registrate</button>

                    <p class="new-account" style="margin-top: 15px;">
                        <a href="#" id="back-to-login">Back to Login</a>
                    </p>
                </div>

            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="script.js"></script>
</body>
</html>
