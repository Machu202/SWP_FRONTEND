<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manga Studio Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="split-layout">
    <section class="left-panel"><img src="cover.png" class="manga-image" alt="Manga cover"></section>
    <section class="right-panel">
      <div class="form-container">
        <h1 class="logo">Manga Studio</h1>
        <div class="tabs" id="login-tabs"><button class="tab active" id="tab-password">Password</button><button class="tab" id="tab-otp">OTP</button></div>
        <form id="form-password-section">
          <div class="input-group"><label>USERNAME</label><input type="text" id="login-username" value="tantou_linh"></div>
          <div class="input-group"><label>PASSWORD</label><div class="password-wrapper"><input type="password" value="123456"><span class="eye-icon">👁️</span></div></div>
          <div class="input-group"><label>LOGIN ROLE</label><select id="login-role" class="role-select"><option value="mangaka">Mangaka</option><option value="assistant">Assistant</option><option value="tantou" selected>Tantou Editor</option><option value="editorial">Editorial Board</option><option value="admin">Admin</option></select></div>
          <button class="btn-primary" id="btn-login">Login</button>
          <div class="divider">Demo accounts redirect by selected role</div>
        </form>
        <form id="form-otp-section" style="display:none;"><div id="otp-step-1"><div class="input-group"><label>Email or Username</label><input type="text" value="tantou_linh"></div><button class="btn-primary" id="btn-enter-otp">Send OTP</button></div><div id="otp-step-2" style="display:none;"><div class="input-group"><label>OTP Code</label><input type="text" value="123456"></div><p class="otp-timer-text">Code expires in <span id="timer-count">60</span>s</p><button class="btn-primary" id="btn-send-again">Send Again</button></div></form>
      </div>
    </section>
  </main>
  <script src="api.js"></script>
  <script src="script.js"></script>
</body>
</html>
