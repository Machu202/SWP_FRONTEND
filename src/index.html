<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaSystem - Authentication</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="split-layout">
        <div class="left-panel">
            <img src="cover.png" alt="Manga Covers" class="manga-image">
        </div>

        <div class="right-panel">
            <div class="form-container">
                <h1 class="logo">MangaSystem</h1>

                <div class="tabs" id="login-tabs">
                    <button class="tab active" id="tab-password">PASSWORD</button>
                    <button class="tab" id="tab-otp">via OTP</button>
                </div>

                <div id="form-password-section" class="form-section">
                    <div class="input-group">
                        <label>Email hoặc Tên đăng nhập</label>
                        <input type="text" id="login-username" placeholder="Ví dụ: leduchuylt@gmail.com hoặc mangaka" name="username" autocomplete="username">
                    </div>

                    <div class="input-group">
                        <label>Mật Khẩu</label>
                        <div class="password-wrapper">
                            <input type="password" id="login-password" placeholder="••••••" name="password" autocomplete="current-password">
                            <span class="eye-icon">👁️</span>
                        </div>
                    </div>

                    <div class="form-actions">
                        <label class="remember-me">
                            <input type="checkbox"> Remember password
                        </label>
                        <a href="#" class="forgot-link" id="forgot-password-link">Forgot password?</a>
                    </div>

                    <button class="btn-primary" id="btn-login">Login</button>

                    <div class="divider">Or login with</div>

                    <div class="social-login">
                        <button class="btn-social" id="btn-google"><strong>Google</strong></button>
                        <button class="btn-social" id="btn-apple"><strong>Apple ID</strong></button>
                    </div>

                    <p class="new-account">New to this page ? <a href="#" id="go-to-register">create new account</a></p>
                </div>

                <div id="form-otp-section" class="form-section" style="display: none;">
                    
                    <div id="otp-step-1">
                        <div class="input-group">
                            <label>Nhập Email / Apple ID</label>
                            <input type="text" id="otp-email" placeholder="Ví dụ: leduchuylt@gmail.com" name="email" autocomplete="email">
                        </div>
                        <button class="btn-primary" id="btn-enter-otp" style="width: 100%; margin-top: 10px;">Send OTP Code</button>
                    </div>

                    <div id="otp-step-2" style="display: none;">
                        <div class="input-group">
                            <label>Nhập mã xác nhận (6 số)</label>
                            <input type="text" id="otp-code" placeholder="123456" style="text-align: center; letter-spacing: 8px; font-size: 20px; font-weight: bold;" name="otpCode" inputmode="numeric">
                        </div>
                        
                        <button class="btn-primary" id="btn-verify-otp" style="width: 100%; margin-top: 10px;">Verify & Login</button>

                        <div style="text-align: center; margin-top: 25px; font-size: 13px;">
                            <p style="color: #6b7280; margin-bottom: 10px;">Mã OTP sẽ hết hạn sau: <span id="timer-count" style="color: #ef4444; font-weight: bold;">60</span>s</p>
                            <span style="color: #4b5563;">Chưa nhận được mã?</span>
                            <button id="btn-send-again" style="background: none; border: none; color: #6366f1; font-weight: bold; cursor: pointer;">Gửi lại</button>
                        </div>
                    </div>
                </div>

                <div id="form-register-section" class="form-section" style="display: none;">
                    <div class="register-header-box">
                        <span class="register-title">Registration</span>
                    </div>

                    <div class="input-group">
                        <label>Email or name</label>
                        <input id="register-email" name="email" autocomplete="email" type="text" placeholder="nguyenhuy@gmail.com or mangaka">
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <div class="password-wrapper">
                            <input type="password" placeholder="••••••">
                            <span class="eye-icon">👁️</span>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Phone number</label>
                        <input type="text" placeholder="••••••">
                    </div>

                    <div class="input-group">
                        <label>Role</label>
                        <select class="role-select" id="register-role" name="role">
                            <option value="mangaka">Mangaka</option>
                            <option value="assistant">Assistant</option>
                            <option value="tantou">Tantou editor</option>
                            <option value="editorial">Editorial board</option>
                        </select>
                    </div>

                    <button class="btn-primary btn-registrate" id="btn-register">Register</button>

                    <p class="new-account" style="margin-top: 15px;">
                        <a href="#" id="back-to-login">Back to Login</a>
                    </p>
                </div>

            </div>
        </div>
    </div>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="api.js"></script>
    <script src="realtime.js"></script>
    <script src="script.js"></script>
</body>
</html>
