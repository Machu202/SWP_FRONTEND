<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaSystem - Role Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="split-layout">
        <div class="left-panel">
            <img src="cover.png" alt="Manga Covers" class="manga-image">
        </div>

        <div class="right-panel">
            <div class="form-container">
                <h1 class="logo">MangaSystem</h1>

                <div class="tabs" id="login-tabs">
                    <button class="tab active" id="tab-password">PASSWORD</button>
                    <button class="tab" id="tab-otp">via OTP</button>
                </div>

                <div id="form-password-section" class="form-section">
                    <div class="input-group">
                        <label>Email hoặc Tên đăng nhập</label>
                        <input type="text" placeholder="Ví dụ: leduchuylt@gmail.com hoặc mangaka">
                    </div>

                    <div class="input-group">
                        <label>Mật Khẩu</label>
                        <div class="password-wrapper">
                            <input type="password" placeholder="••••••">
                            <span class="eye-icon">👁️</span>
                        </div>
                    </div>

                    <div class="form-actions">
                        <label class="remember-me">
                            <input type="checkbox"> Remember password
                        </label>
                        <a href="#" class="forgot-link" id="forgot-password-link">Forgot password?</a>
                    </div>

                    <div class="input-group">
                        <label>Login Role</label>
                        <select class="role-select" id="login-role-select">
                            <option value="mangaka">Mangaka</option>
                            <option value="assistant">Assistant</option>
                            <option value="tantou">Tantou editor</option>
                            <option value="editorial">Editorial board</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>

                    <button class="btn-primary" id="btn-login">Login</button>

                    <div class="divider">Or login with</div>

                    <div class="social-login">
                        <button class="btn-social" id="btn-google"><strong>Google</strong></button>
                        <button class="btn-social" id="btn-apple"><strong>Apple ID</strong></button>
                    </div>

                    <p class="new-account">New to this page ? <a href="#" id="go-to-register">create new account</a></p>
                </div>

                <div id="form-otp-section" class="form-section" style="display: none;">
                    
                    <div id="otp-step-1">
                        <div class="input-group">
                            <label>Enter gmail / Apple ID</label>
                            <input type="text" placeholder="Ví dụ: leduchuylt@gmail.com">
                        </div>
                        <div class="center-btn">
                            <button class="btn-secondary" id="btn-enter-otp">Enter</button>
                        </div>
                    </div>

                    <div id="otp-step-2" style="display: none;">
                        <div class="input-group">
                            <input type="text" placeholder="Ví dụ: 111-111" class="otp-input-large">
                        </div>
                        
                        <p class="otp-timer-text">OTP has been sent and will expired in <span id="timer-count">60</span>s</p>
                        
                        <div class="otp-resend-action">
                            <span class="not-received-text">Not received OTP?</span>
                            <button class="btn-orange" id="btn-send-again">Send again</button>
                        </div>
                    </div>

                </div>

                <div id="form-register-section" class="form-section" style="display: none;">
                    <div class="register-header-box">
                        <span class="register-title">Registration</span>
                    </div>

                    <div class="input-group">
                        <label>Email or name</label>
                        <input type="text" placeholder="nguyenhuy@gmail.com or mangaka">
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <div class="password-wrapper">
                            <input type="password" placeholder="••••••">
                            <span class="eye-icon">👁️</span>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Phone number</label>
                        <input type="text" placeholder="••••••">
                    </div>

                    <div class="input-group">
                        <label>Role</label>
                        <select class="role-select">
                            <option value="mangaka">Mangaka</option>
                            <option value="assistant">Assistant</option>
                            <option value="tantou">Tantou editor</option>
                            <option value="editorial">Editorial board</option>
                        </select>
                    </div>

                    <button class="btn-primary btn-registrate">Registrate</button>

                    <p class="new-account" style="margin-top: 15px;">
                        <a href="#" id="back-to-login">Back to Login</a>
                    </p>
                </div>

            </div>
        </div>
    </div>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="api.js"></script>
    <script src="script.js"></script>
</body>
</html>
