<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manuscripts - Studio Flow</title>
    <link rel="stylesheet" href="./assets/css/style-workspace.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Chỉ thêm CSS cho Hộp thoại Popup (Vì trước đây chưa có) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-box {
            background: white; width: 450px; border-radius: 12px; padding: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="workspace-title">
            <div class="ws-logo">SF</div>
            <div class="ws-name">Mangaka Workspace</div>
        </div>
        
        <a href="create-series.html" class="btn-sidebar-action"><i class="fa-solid fa-plus" style="margin-right: 5px;"></i> New Series</a>
        
        <nav class="nav-group">
            <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-border-all"></i> Dashboard</a>
            <a href="series.html" class="nav-item"><i class="fa-solid fa-book"></i> Series</a>
            <a href="manuscripts.html" class="nav-item active"><i class="fa-solid fa-file-pen"></i> Manuscripts</a>
            <a href="assignments.html" class="nav-item"><i class="fa-solid fa-clipboard-list"></i> Assignments</a>
            <a href="review.html" class="nav-item"><i class="fa-solid fa-message"></i> Review</a>
        </nav>
    </aside>

    <main class="main-wrapper">
        <header class="topbar">
            <div class="topbar-left" style="display: flex; align-items: center; gap: 15px;">
                <button onclick="window.location.href='series.html'" style="background: transparent; border: 1px solid #cbd5e1; border-radius: 6px; padding: 6px 12px; cursor: pointer; color: #475569;">
                    <i class="fa-solid fa-arrow-left"></i> Quay lại
                </button>
                <span style="font-weight: 600; color: #64748b;" id="header-series-title">Đang tải Tác phẩm...</span>
            </div>
            
            <div class="topbar-right">
                <div class="search-box"><i class="fa-solid fa-magnifying-glass" style="color: #9ca3af;"></i><input type="text" placeholder="Search..."></div>
                <a href="notifications.html" class="top-icon"><i class="fa-regular fa-bell"></i></a>
                <div style="width: 32px; height: 32px; background: #e0e7ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #4f46e5; font-weight: bold;">MK</div>
            </div>
        </header>

        <div class="content-padding">
            <div class="page-header" style="display: flex; justify-content: space-between; align-items: flex-end;">
                <div>
                    <h1>Quản lý Bản thảo (Chapters)</h1>
                    <p>Tạo chương mới, phân công trợ lý và theo dõi tiến độ từng trang.</p>
                </div>
                <button id="btn-open-modal" class="btn-publish" style="padding: 10px 20px; font-size: 14px;">
                    <i class="fa-solid fa-plus" style="margin-right: 5px;"></i> Thêm Chapter
                </button>
            </div>

            <div id="chapters-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px;">
                <div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: #64748b;">
                    <i class="fa-solid fa-spinner fa-spin" style="font-size: 24px; margin-bottom: 10px;"></i>
                    <p>Đang tải danh sách Chapter...</p>
                </div>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="chapter-modal">
        <div class="modal-box">
            <h2 style="margin: 0 0 20px 0; font-size: 20px; color: #1e293b; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px;">Tạo Chapter Mới</h2>
            
            <div class="form-group" style="margin-bottom: 15px;">
                <label style="display: block; font-size: 14px; font-weight: 600; color: #334155; margin-bottom: 8px;">Số thứ tự Chapter <span style="color: red;">*</span></label>
                <input type="number" id="chapter-number" class="form-control" placeholder="Ví dụ: 1, 2, 3..." style="width: 100%; box-sizing: border-box;">
            </div>
            
            <div class="form-group" style="margin-bottom: 25px;">
                <label style="display: block; font-size: 14px; font-weight: 600; color: #334155; margin-bottom: 8px;">Tên Chapter (Tiêu đề)</label>
                <input type="text" id="chapter-title" class="form-control" placeholder="Nhập tiêu đề chương (Tùy chọn)..." style="width: 100%; box-sizing: border-box;">
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                <button id="btn-close-modal" style="padding: 10px 15px; background: white; border: 1px solid #cbd5e1; border-radius: 6px; color: #475569; font-weight: 600; cursor: pointer;">Hủy</button>
                <button id="btn-submit-chapter" class="btn-publish" style="padding: 10px 20px;">Tạo ngay</button>
            </div>
        </div>
    </div>

    <script src="./assets/js/api.js"></script>
    <script src="./assets/js/manuscripts.js"></script>
</body>
</html>
