<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Series - Studio Flow</title>
    <link rel="stylesheet" href="./assets/css/style-workspace.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <aside class="sidebar">
        <div class="workspace-title">
            <div class="ws-logo">SF</div>
            <div class="ws-name">Mangaka Workspace</div>
        </div>
        
        <a href="create-series.html" class="btn-sidebar-action"><i class="fa-solid fa-plus" style="margin-right: 5px;"></i> New Series</a>
        
        <nav class="nav-group">
            <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-border-all"></i> Dashboard</a>
            <a href="series.html" class="nav-item active"><i class="fa-solid fa-book"></i> Series</a>
            <a href="manuscripts.html" class="nav-item"><i class="fa-solid fa-file-pen"></i> Manuscripts</a>
            <a href="assignments.html" class="nav-item"><i class="fa-solid fa-clipboard-list"></i> Assignments</a>
            <a href="review.html" class="nav-item"><i class="fa-solid fa-message"></i> Review</a>
        </nav>
    </aside>

    <main class="main-wrapper">
        <header class="topbar">
            <div class="topbar-left">
                <a href="#">Workflow</a><a href="#">Schedule</a><a href="#">Assets</a>
            </div>
            <div class="topbar-right">
                <div class="search-box"><i class="fa-solid fa-magnifying-glass" style="color: #9ca3af;"></i><input type="text" placeholder="Search..."></div>
                <a href="notifications.html" class="top-icon"><i class="fa-regular fa-bell"></i></a>
                <div style="width: 32px; height: 32px; background: #e0e7ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #4f46e5; font-weight: bold;">MK</div>
            </div>
        </header>

        <div class="content-padding">
            <div class="page-header">
                <div>
                    <h1>Quản lý Series</h1>
                    <p>Tổng hợp tất cả các dự án Manga đang thực hiện của bạn.</p>
                </div>
            </div>

            <div id="series-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; margin-top: 20px;">
                <div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: #64748b;">
                    <i class="fa-solid fa-spinner fa-spin" style="font-size: 24px; margin-bottom: 10px;"></i>
                    <p>Đang tải dữ liệu từ máy chủ...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="./assets/js/api.js"></script>
    <script src="./assets/js/mangaka.js"></script>
</body>
</html>
