<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaSystem - Manuscripts</title>
    <link rel="stylesheet" href="style-workspace.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <aside class="sidebar">
        <div class="workspace-title"><div class="ws-logo">SF</div><div class="ws-name">Mangaka Workspace</div></div>
        <nav class="nav-group">
            <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-border-all"></i> Dashboard</a>
            <a href="series.html" class="nav-item"><i class="fa-solid fa-book"></i> Series</a>
            <a href="manuscripts.html" class="nav-item active"><i class="fa-solid fa-file-pen"></i> Manuscripts</a>
            <a href="assignments.html" class="nav-item"><i class="fa-solid fa-clipboard-list"></i> Assignments</a>
            <a href="review.html" class="nav-item"><i class="fa-solid fa-message"></i> Review</a>
            <a href="analytics.html" class="nav-item"><i class="fa-solid fa-chart-line"></i> Analytics</a>
        </nav>
    </aside>

    <main class="main-wrapper">
        <header class="topbar">
            <div class="topbar-left">
                <strong style="color: black; margin-right: 15px;">Studio Flow</strong>
            </div>
            <div class="topbar-right">
                <div class="search-box"><i class="fa-solid fa-magnifying-glass" style="color: #9ca3af;"></i><input type="text" placeholder="Search..."></div>
                <img src="https://i.pravatar.cc/150?img=12" style="width: 32px; height: 32px; border-radius: 50%;">
            </div>
        </header>

        <div class="content-padding">
            <div class="page-header" style="align-items: center;">
                <div>
                    <h1>Manuscripts & Chapters</h1>
                    <p>Manage your storyboard pagination, layout panel sketches, and team alignment.</p>
                </div>
                <button class="btn-publish" onclick="window.location.href='create-chapter.html'"><i class="fa-solid fa-plus" style="margin-right: 5px;"></i> New Chapter</button>
            </div>

            <div id="chapter-list-container" class="empty-state-box" style="margin-top: 50px;">
                <i class="fa-solid fa-file-lines"></i>
                <p>Chưa có bản thảo nào được tạo. Nhấn "New Chapter" để bắt đầu.</p>
            </div>
        </div>
    </main>
    <script src="api.js"></script>
    <script src="realtime.js"></script>
    <script src="script.js"></script>
    <script src="script-workspace.js"></script>
</body>
</html>
